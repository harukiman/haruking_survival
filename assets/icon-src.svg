<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 背景: 昼夜サイクルを暗示する斜めグラデ(左上=夜明けの暖色 → 右下=深い夜) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3a63"/>
      <stop offset="0.42" stop-color="#1a2440"/>
      <stop offset="1" stop-color="#0c1224"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.44" r="0.62">
      <stop offset="0" stop-color="#4a7bd0" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#24345e" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0c1224" stop-opacity="0"/>
    </radialGradient>
    <!-- 世界メダリオンの地面 -->
    <radialGradient id="land" cx="0.42" cy="0.36" r="0.85">
      <stop offset="0" stop-color="#57b23e"/>
      <stop offset="0.6" stop-color="#3f9430"/>
      <stop offset="1" stop-color="#2c6f24"/>
    </radialGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fd0ff"/>
      <stop offset="1" stop-color="#3a86c8"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#bfefff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="bladeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8fe0ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8fe0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe9a0"/>
      <stop offset="0.5" stop-color="#c9a24a"/>
      <stop offset="1" stop-color="#8a6b28"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="dropsh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ベース(iOSが角丸マスクするため全面塗り) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- 星々(星の世界の暗示) -->
  <g fill="#dce8ff">
    <circle cx="86" cy="96" r="3.2" opacity="0.9"/>
    <circle cx="132" cy="150" r="2" opacity="0.7"/>
    <circle cx="418" cy="118" r="2.6" opacity="0.85"/>
    <circle cx="452" cy="176" r="1.8" opacity="0.6"/>
    <circle cx="392" cy="72" r="1.8" opacity="0.7"/>
    <circle cx="70" cy="188" r="1.8" opacity="0.55"/>
  </g>
  <!-- 太陽(左上)と月(右上): 昼夜サイクル -->
  <circle cx="112" cy="112" r="30" fill="#ffd86b" opacity="0.28" filter="url(#soft)"/>
  <circle cx="112" cy="112" r="17" fill="#ffe08a"/>
  <path d="M418 92 a26 26 0 1 0 22 40 a30 30 0 1 1 -22 -40 z" fill="#e7eefc"/>

  <!-- 世界メダリオン -->
  <g filter="url(#dropsh)">
    <circle cx="256" cy="272" r="150" fill="url(#rim)"/>
    <circle cx="256" cy="272" r="139" fill="url(#land)"/>
    <!-- クリップして中の地形を収める -->
    <clipPath id="disc"><circle cx="256" cy="272" r="139"/></clipPath>
    <g clip-path="url(#disc)">
      <!-- 砂浜/海(下部) -->
      <path d="M117 360 Q256 300 395 360 L395 411 L117 411 Z" fill="#e8d59a"/>
      <path d="M117 384 Q256 336 395 384 L395 411 L117 411 Z" fill="url(#river)"/>
      <!-- 蛇行する川 -->
      <path d="M150 150 C210 210 190 250 250 285 C305 316 300 360 340 400" fill="none" stroke="url(#river)" stroke-width="20" stroke-linecap="round" opacity="0.95"/>
      <!-- 土の小道 -->
      <path d="M256 300 C250 350 262 380 258 412" fill="none" stroke="#9c6b3f" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
      <!-- 木々(俯瞰の丸い樹冠+影) -->
      <g>
        <ellipse cx="182" cy="210" rx="26" ry="24" fill="#1f5a1c" opacity="0.5"/>
        <circle cx="180" cy="204" r="24" fill="#3c8f34"/>
        <circle cx="172" cy="197" r="9" fill="#57b23e"/>
        <ellipse cx="330" cy="240" rx="24" ry="22" fill="#1f5a1c" opacity="0.5"/>
        <circle cx="328" cy="234" r="22" fill="#3c8f34"/>
        <circle cx="321" cy="228" r="8" fill="#57b23e"/>
        <ellipse cx="300" cy="170" rx="18" ry="17" fill="#1f5a1c" opacity="0.5"/>
        <circle cx="298" cy="165" r="17" fill="#3c8f34"/>
      </g>
      <!-- 焚き火(小さな暖色の点) -->
      <circle cx="208" cy="300" r="12" fill="#ff8a3a" opacity="0.35" filter="url(#soft)"/>
      <circle cx="208" cy="300" r="5" fill="#ffd86b"/>
    </g>
  </g>

  <!-- 主人公(俯瞰トークン)+ 発光する刃(虚空断ちの暗示) -->
  <g filter="url(#dropsh)">
    <!-- 剣の光 -->
    <circle cx="300" cy="228" r="52" fill="url(#bladeGlow)"/>
    <!-- 影 -->
    <ellipse cx="256" cy="300" rx="42" ry="16" fill="#000" opacity="0.32"/>
    <!-- 体 -->
    <circle cx="256" cy="272" r="34" fill="#37507e"/>
    <circle cx="256" cy="272" r="34" fill="none" stroke="#22304a" stroke-width="4"/>
    <!-- マント/肩 -->
    <path d="M228 262 q28 -22 56 0 q-6 20 -28 22 q-22 -2 -28 -22 z" fill="#4a6ba8"/>
    <!-- 頭 -->
    <circle cx="256" cy="256" r="19" fill="#f2c79a"/>
    <path d="M239 250 a17 17 0 0 1 34 0 q-17 -10 -34 0 z" fill="#5a3b26"/>
    <!-- 掲げた刃 -->
    <g transform="rotate(38 300 226)">
      <rect x="293" y="150" width="14" height="86" rx="6" fill="url(#blade)"/>
      <rect x="286" y="232" width="28" height="9" rx="4" fill="#c9a24a"/>
      <rect x="297" y="238" width="6" height="20" rx="3" fill="#8a6b28"/>
    </g>
  </g>

  <!-- 内側の光沢リム -->
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>
</svg>
